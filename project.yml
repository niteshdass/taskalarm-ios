name: TaskAlarm
options:
  bundleIdPrefix: com.niteshdas
  deploymentTarget:
    iOS: "26.0"
  createIntermediateGroups: true

targets:
  TaskAlarm:
    type: application
    platform: iOS
    sources: [TaskAlarm]
    info:
      path: TaskAlarm/Info.plist
      properties:
        NSAlarmKitUsageDescription: TaskAlarm needs permission to schedule alarms that ring even in silent mode.
        NSCameraUsageDescription: TaskAlarm uses the camera to scan your wake-up QR code.
        UILaunchScreen: {}
    settings:
      base:
        SWIFT_VERSION: "6.0"
        TARGETED_DEVICE_FAMILY: "1"
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: "1.0"

  TaskAlarmTests:
    type: bundle.unit-test
    platform: iOS
    sources: [TaskAlarmTests]
    dependencies:
      - target: TaskAlarm
    settings:
      base:
        SWIFT_VERSION: "6.0"

schemes:
  TaskAlarm:
    build:
      targets:
        TaskAlarm: all
    test:
      targets: [TaskAlarmTests]
